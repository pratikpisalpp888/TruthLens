# DOCKER SETUP - FOR PRODUCTION DEPLOYMENT ONLY
# For development, run services directly on host machine (See DEVELOPMENT_SETUP.md)
version: "3.9"
networks:
  truthlens-network:
    driver: bridge

volumes:
  cockroach-data:
  qdrant-data:
  minio-data:
  ollama-data:

services:
  cockroachdb:
    image: cockroachdb/cockroach:v23.2.0
    container_name: truthlens_cockroachdb
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    command: start-single-node --insecure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - truthlens-network

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: truthlens_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__OPTIMIZERS__DEFAULT_SEGMENT_NUMBER=2
    networks:
      - truthlens-network

  minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    container_name: truthlens_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-truthlens}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-truthlens123}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - truthlens-network

  ollama:
    image: ollama/ollama:latest
    container_name: truthlens_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      restart_policy:
        condition: any
    networks:
      - truthlens-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: truthlens_backend
    ports:
      - "8000:8000"
    depends_on:
      cockroachdb:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      ollama:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - truthlens-network
